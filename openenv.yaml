name: support-triage-openenv
version: 0.1.0
description: Real-world customer support triage environment for evaluating AI agents on ticket classification, prioritization, routing, escalation, and response drafting.
entrypoint: app.env:SupportTriageEnv

metadata:
  domain: customer_support
  tags:
    - openenv
    - customer-support
    - triage
    - real-world
    - agent-evaluation

models:
  observation: app.models:Observation
  action: app.models:Action
  reward: app.models:Reward

tasks:
  - id: easy_billing_refund
    difficulty: easy
    description: Classify and resolve a simple billing refund ticket.

  - id: medium_shipping_missing_info
    difficulty: medium
    description: Handle a shipping complaint with missing information.

  - id: hard_enterprise_security_incident
    difficulty: hard
    description: Escalate and respond safely to an enterprise security incident.